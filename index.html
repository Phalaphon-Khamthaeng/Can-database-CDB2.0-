<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SUN VENDING — Cabinet Database</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
<script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#F9FAFB;min-height:100vh;}
:root{
  --red:#D72B2B;--red-dark:#B01E1E;--red-bg:#FFF5F5;
  --white:#fff;--g50:#F9FAFB;--g100:#F3F4F6;--g200:#E5E7EB;
  --g300:#D1D5DB;--g400:#9CA3AF;--g600:#4B5563;--g800:#1F2937;
  --green:#16A34A;--green-bg:#F0FDF4;
  --blue:#2563EB;--blue-bg:#EFF6FF;--blue-light:#BFDBFE;
}
button{cursor:pointer;font-family:'DM Sans',sans-serif;}
input{font-family:'DM Sans',sans-serif;}
.page{display:none;min-height:100vh;}
.page.active{display:block;}
.header{background:var(--white);border-bottom:1px solid var(--g200);padding:14px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.logo{display:flex;align-items:center;gap:8px;cursor:pointer;}
.logo-s{width:36px;height:36px;background:var(--red);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:22px;}
.logo-text .l1{font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--red);letter-spacing:2px;line-height:1;}
.logo-text .l2{font-size:9px;color:var(--g400);letter-spacing:1px;}
.container{max-width:520px;margin:0 auto;padding:24px 16px 80px;}
.card{background:var(--white);border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,.06);padding:24px;border:1px solid var(--g200);}
.card+.card{margin-top:14px;}
.btn{border:none;border-radius:10px;padding:12px 18px;font-size:14px;font-weight:600;display:inline-flex;align-items:center;justify-content:center;gap:6px;transition:all .2s;cursor:pointer;}
.btn:hover{opacity:.88;transform:translateY(-1px);}
.btn:active{transform:translateY(0);}
.btn-red{background:linear-gradient(135deg,var(--red-dark),var(--red));color:#fff;box-shadow:0 4px 12px rgba(215,43,43,.25);}
.btn-blue{background:linear-gradient(135deg,#1D4ED8,var(--blue));color:#fff;box-shadow:0 4px 12px rgba(37,99,235,.25);}
.btn-outline{background:var(--white);border:1.5px solid var(--g200);color:var(--g600);}
.btn-sm{padding:7px 12px;font-size:12px;border-radius:8px;}
.btn-full{width:100%;}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.stat-card{background:var(--white);border-radius:12px;padding:14px;border:1px solid var(--g200);}
.stat-label{font-size:11px;color:var(--g400);margin-bottom:2px;}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--g800);}
.search-wrap{position:relative;margin-bottom:14px;}
.search-wrap input{width:100%;padding:11px 13px 11px 36px;border:1px solid var(--g200);border-radius:10px;font-size:13px;color:var(--g800);outline:none;background:var(--white);}
.search-wrap input:focus{border-color:var(--red);}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;}
.rec-card{background:var(--white);border-radius:12px;border:1px solid var(--g200);display:flex;gap:12px;padding:14px;cursor:pointer;margin-bottom:10px;transition:all .2s;}
.rec-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08);}
.rec-thumb{width:68px;height:68px;border-radius:10px;overflow:hidden;background:var(--g100);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:26px;}
.rec-thumb img{width:100%;height:100%;object-fit:cover;transition:opacity .3s;}
.rec-info{flex:1;min-width:0;}
.rec-model{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--g800);letter-spacing:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rec-tags{display:flex;gap:5px;margin-top:4px;flex-wrap:wrap;}
.tag{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--g100);color:var(--g600);}
.tag.green{background:var(--green-bg);color:var(--green);}
.tag.blue{background:var(--blue-bg);color:var(--blue);}
.rec-date{font-size:11px;color:var(--g400);margin-top:5px;}
.empty{text-align:center;padding:60px 0;color:var(--g400);}
/* Wizard */
.wiz-wrap{min-height:100vh;background:var(--g50);display:flex;flex-direction:column;align-items:center;padding:20px 16px 60px;}
.wiz-header{width:100%;max-width:500px;margin-bottom:20px;}
.prog-wrap{width:100%;height:6px;background:var(--g200);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--red-dark),var(--red));border-radius:3px;transition:width .4s;}
.dots-wrap{display:flex;gap:3px;margin-top:10px;justify-content:center;flex-wrap:wrap;}
.dot{width:6px;height:6px;border-radius:3px;background:var(--g200);transition:all .3s;}
.dot.wide{width:18px;}
.dot.done,.dot.active{background:var(--red);}
.dot.inactive{opacity:.3;}
.wiz-card{width:100%;max-width:500px;background:var(--white);border-radius:20px;box-shadow:0 4px 24px rgba(0,0,0,.08);padding:28px 24px;min-height:440px;display:flex;flex-direction:column;}
.wiz-content{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.wiz-nav{display:flex;gap:10px;margin-top:20px;}
.step-icon{width:68px;height:68px;border-radius:18px;background:var(--red-bg);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:36px;}
.step-title{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--red);letter-spacing:2px;text-align:center;}
.step-sub{font-size:13px;color:var(--g400);text-align:center;margin-top:4px;margin-bottom:16px;}
.photo-section{width:100%;max-width:460px;}
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-top:10px;}
.photo-thumb{position:relative;border-radius:10px;overflow:hidden;background:var(--g100);aspect-ratio:1;}
.photo-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.photo-thumb .del-btn{position:absolute;top:5px;right:5px;width:26px;height:26px;background:rgba(215,43,43,.9);border:none;border-radius:50%;color:#fff;font-size:13px;display:flex;align-items:center;justify-content:center;}
.photo-thumb .img-num{position:absolute;bottom:5px;left:6px;background:rgba(0,0,0,.5);color:#fff;font-size:10px;padding:2px 5px;border-radius:8px;font-weight:600;}
.add-photo-btn{border:2px dashed var(--g300);border-radius:10px;aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;background:var(--g50);transition:all .2s;font-size:24px;}
.add-photo-btn:hover,.add-photo-btn.drag{border-color:var(--red);background:var(--red-bg);}
.add-photo-btn p{font-size:11px;color:var(--g400);text-align:center;line-height:1.3;}
.tracker{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-top:14px;width:100%;max-width:520px;padding:0 8px;}
.tracker-item{display:flex;align-items:center;gap:3px;padding:4px 9px;border-radius:20px;font-size:9.5px;font-weight:500;white-space:nowrap;}
.tracker-item.done{background:var(--green-bg);border:1px solid var(--green);color:var(--green);}
.tracker-item.active{background:var(--red-bg);border:1.5px solid var(--red);color:var(--red);font-weight:700;}
.tracker-item.upcoming{background:var(--g100);border:1px solid var(--g200);color:var(--g400);}
.sum-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--g100);}
.sum-key{font-size:13px;color:var(--g400);}
.sum-val{font-size:13px;color:var(--g800);font-weight:600;}
.photo-mini-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:10px;}
.photo-mini{text-align:center;}
.photo-mini-img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:6px;border:1.5px solid var(--green);}
.photo-mini-empty{width:100%;aspect-ratio:1;border-radius:6px;background:var(--g100);display:flex;align-items:center;justify-content:center;font-size:16px;}
.photo-mini p{font-size:8px;color:var(--g400);margin-top:2px;line-height:1.2;}
.photo-mini.has p{color:var(--green);}
.count-badge{display:inline-flex;align-items:center;justify-content:center;background:var(--red);color:#fff;border-radius:50%;width:16px;height:16px;font-size:9px;font-weight:700;margin-left:2px;}
.up-step{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--g100);}
.up-step:last-child{border-bottom:none;}
.up-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px;}
.up-icon.pending{background:var(--g100);}
.up-icon.loading{background:var(--blue-bg);animation:pulse 1s infinite;}
.up-icon.done{background:var(--green-bg);}
.up-icon.error{background:#FEE2E2;}
.up-label{font-size:13px;}
.up-label.pending{color:var(--g400);}
.up-label.loading{color:var(--blue);font-weight:600;}
.up-label.done{color:var(--g800);}
.up-label.error{color:#991B1B;}
.login-btn{display:flex;align-items:center;gap:5px;padding:7px 13px;background:var(--blue-bg);border:1px solid var(--blue-light);border-radius:20px;color:var(--blue);font-size:12px;font-weight:600;}
/* Detail */
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.detail-card{border-radius:10px;overflow:hidden;border:1px solid var(--g200);}
.detail-card.has-photo{border-color:var(--green);}
.detail-photos-strip{display:flex;gap:4px;flex-wrap:wrap;padding:6px;}
.detail-photos-strip img{height:70px;width:70px;object-fit:cover;border-radius:6px;border:1px solid var(--g200);background:var(--g100);transition:opacity .4s;}
.detail-img-loading{opacity:0.2;}
.detail-img-loaded{opacity:1;}
.detail-card-label{padding:7px 10px;font-size:12px;font-weight:600;color:var(--g600);background:var(--white);border-top:1px solid var(--g200);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.5};}
</style>
</head>
<body>

<!-- LIST PAGE -->
<div id="page-list" class="page active">
  <div class="header">
    <div class="logo"><div class="logo-s">S</div><div class="logo-text"><div class="l1">SUN VENDING</div><div class="l2">CAN DATABASE</div></div></div>
    <div style="display:flex;gap:8px;align-items:center;">
      <span id="list-user-badge" style="display:none;font-size:12px;color:var(--green);background:var(--green-bg);padding:4px 10px;border-radius:20px;"></span>
      <button onclick="showPage('config')" class="btn btn-outline btn-sm">⚙️ ตั้งค่า</button>
      <button id="btn-list-logout" onclick="doLogout()" style="display:none;" class="btn btn-outline btn-sm">🚪</button>
      <button id="btn-sync" onclick="syncFromSharePoint()" style="display:none;" class="btn btn-outline btn-sm">🔄 ซิงค์</button>
      <button onclick="startWizard()" class="btn btn-red">+ เพิ่มตู้</button>
    </div>
  </div>
  <div class="container">
    <div class="stats">
      <div class="stat-card"><div class="stat-label">📦 ตู้ทั้งหมด</div><div class="stat-val" id="stat-total">0</div></div>
      <div class="stat-card"><div class="stat-label">📷 รูปภาพรวม</div><div class="stat-val" id="stat-photos">0</div></div>
    </div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" placeholder="ค้นหา Brand / Model / Year..." oninput="renderList(this.value)"/>
    </div>
    <div id="list-container"></div>
  </div>
</div>

<!-- DETAIL PAGE -->
<div id="page-detail" class="page">
  <div class="header">
    <button class="btn btn-outline btn-sm" onclick="showPage('list')">← กลับ</button>
    <span id="detail-title" style="font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;color:var(--g800);"></span>
    <div style="min-width:80px;text-align:right;">
      <button id="btn-detail-load" onclick="triggerLoadImages()" style="display:none;" class="btn btn-outline btn-sm">🖼️ โหลดรูป</button>
    </div>
  </div>
  <div class="container">
    <div class="card" id="detail-info"></div>
    <div class="card" style="margin-top:14px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:12px;color:var(--red);letter-spacing:2px;">รูปภาพ</div>
        <div id="detail-load-status" style="font-size:11px;color:var(--g400);"></div>
      </div>
      <div class="detail-grid" id="detail-photos"></div>
    </div>
  </div>
</div>

<!-- CONFIG PAGE -->
<div id="page-config" class="page">
  <div class="header">
    <div class="logo"><div class="logo-s">S</div><div class="logo-text"><div class="l1">SUN VENDING</div><div class="l2">CAN DATABASE</div></div></div>
    <button class="btn btn-outline btn-sm" onclick="showPage('list')">✕ ปิด</button>
  </div>
  <div class="container">
    <div class="card">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px;">
        <div style="width:44px;height:44px;border-radius:12px;background:var(--blue-bg);display:flex;align-items:center;justify-content:center;font-size:22px;">⚙️</div>
        <div><div style="font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;">ตั้งค่า Azure + SharePoint</div><div style="font-size:11px;color:var(--g400);">Config ครั้งเดียว จำไว้เสมอ</div></div>
      </div>
      <div style="display:flex;flex-direction:column;gap:14px;">
        <div><label style="font-size:13px;font-weight:600;color:var(--g800);display:block;margin-bottom:5px;">Client ID (Azure App)</label>
          <input id="cfg-client" style="width:100%;padding:10px 14px;border:1px solid var(--g200);border-radius:8px;font-size:12px;font-family:monospace;color:var(--g800);outline:none;" value="bfb978c2-2df7-4598-8b29-63df63f724cc"/></div>
        <div><label style="font-size:13px;font-weight:600;color:var(--g800);display:block;margin-bottom:5px;">Tenant ID (Azure)</label>
          <input id="cfg-tenant" style="width:100%;padding:10px 14px;border:1px solid var(--g200);border-radius:8px;font-size:12px;font-family:monospace;color:var(--g800);outline:none;" value="34f5f15c-d8ec-4aaa-8240-5b8a5cd8fbb1"/></div>
        <div><label style="font-size:13px;font-weight:600;color:var(--g800);display:block;margin-bottom:5px;">SharePoint Site Host</label>
          <input id="cfg-site" style="width:100%;padding:10px 14px;border:1px solid var(--g200);border-radius:8px;font-size:12px;font-family:monospace;color:var(--g800);outline:none;" value="sun108.sharepoint.com"/></div>
        <div><label style="font-size:13px;font-weight:600;color:var(--g800);display:block;margin-bottom:5px;">SharePoint Site Name</label>
          <input id="cfg-site-name" style="width:100%;padding:10px 14px;border:1px solid var(--g200);border-radius:8px;font-size:12px;font-family:monospace;color:var(--g800);outline:none;" value="ITRDmanagement"/></div>
        <div><label style="font-size:13px;font-weight:600;color:var(--g800);display:block;margin-bottom:5px;">Path โฟลเดอร์ Model (ใน Documents)</label>
          <input id="cfg-model-path" style="width:100%;padding:10px 14px;border:1px solid var(--g200);border-radius:8px;font-size:12px;font-family:monospace;color:var(--g800);outline:none;" value="RD/Knowledge/Used Can Database/CDB(Web app)/Model"/></div>
        <div><label style="font-size:13px;font-weight:600;color:var(--g800);display:block;margin-bottom:5px;">ชื่อไฟล์ Excel หลัก</label>
          <input id="cfg-excel-name" style="width:100%;padding:10px 14px;border:1px solid var(--g200);border-radius:8px;font-size:12px;font-family:monospace;color:var(--g800);outline:none;" value="Used_Can_Web.xlsx"/></div>
      </div>
      <button class="btn btn-red btn-full" style="margin-top:20px;" onclick="saveConfig()">💾 บันทึกการตั้งค่า</button>
      <button class="btn btn-outline btn-full" style="margin-top:10px;border-color:#FECACA;color:#991B1B;" onclick="clearData()">🗑️ ล้างข้อมูลทั้งหมด (Local)</button>
    </div>
  </div>
</div>

<!-- WIZARD PAGE -->
<div id="page-wizard" class="page">
  <div class="wiz-wrap">
    <div class="wiz-header">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
        <div class="logo" onclick="cancelWizard()">
          <div class="logo-s">S</div><div class="logo-text"><div class="l1">SUN VENDING</div><div class="l2">CAN DATABASE</div></div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <span id="wiz-user-badge" style="display:none;font-size:11px;color:var(--green);background:var(--green-bg);padding:4px 10px;border-radius:20px;"></span>
          <button id="btn-wiz-login" onclick="doLogin(true)" class="login-btn">🔐 Login Microsoft</button>
          <span id="wiz-step-num" style="font-size:12px;color:var(--g400);"></span>
        </div>
      </div>
      <div class="prog-wrap"><div class="prog-fill" id="wiz-prog"></div></div>
      <div class="dots-wrap" id="wiz-dots"></div>
    </div>
    <div class="wiz-card">
      <div class="wiz-content" id="wiz-content"></div>
      <div>
        <div class="wiz-nav">
          <button id="wiz-btn-back" class="btn btn-outline" style="flex:1;display:none;" onclick="wizBack()">← กลับ</button>
          <button id="wiz-btn-next" class="btn btn-red" style="flex:2;" onclick="wizNext()">ถัดไป →</button>
        </div>
        <div style="text-align:center;margin-top:10px;">
          <button id="wiz-btn-skip" style="display:none;background:none;border:none;color:var(--g400);font-size:12px;text-decoration:underline;" onclick="wizStep++;renderWiz()">ข้ามขั้นตอนนี้</button>
        </div>
      </div>
    </div>
    <div class="tracker" id="wiz-tracker"></div>
  </div>
</div>

<!-- UPLOADING PAGE -->
<div id="page-uploading" class="page">
  <div style="min-height:100vh;background:var(--g50);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 16px;">
    <div style="width:100%;max-width:500px;">
      <div style="text-align:center;margin-bottom:28px;">
        <div id="up-main-icon" style="width:64px;height:64px;border-radius:20px;background:var(--blue-bg);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:34px;">☁️</div>
        <div id="up-title" style="font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--g800);letter-spacing:2px;">กำลังอัปโหลด...</div>
        <div style="margin-top:10px;">
          <div class="prog-wrap"><div class="prog-fill" id="up-prog" style="width:0%;background:linear-gradient(90deg,#1D4ED8,var(--blue));"></div></div>
          <div id="up-prog-label" style="font-size:12px;color:var(--g400);margin-top:6px;"></div>
        </div>
      </div>
      <div class="card"><div id="up-steps"></div></div>
      <div id="up-error" style="display:none;margin-top:14px;background:#FEF2F2;border:1px solid #FECACA;border-radius:12px;padding:14px;font-size:13px;color:#991B1B;"></div>
    </div>
  </div>
</div>

<!-- SUCCESS PAGE -->
<div id="page-success" class="page">
  <div style="min-height:100vh;background:var(--white);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:20px;">
    <div style="width:80px;height:80px;border-radius:24px;background:var(--green-bg);display:flex;align-items:center;justify-content:center;font-size:44px;">✅</div>
    <div style="font-family:'Bebas Neue',sans-serif;font-size:42px;color:var(--red);letter-spacing:4px;">บันทึกสำเร็จ!</div>
    <div id="success-detail" style="font-size:13px;color:var(--g400);text-align:center;max-width:340px;line-height:1.8;"></div>
    <button class="btn btn-red" style="margin-top:8px;font-size:16px;padding:14px 32px;" onclick="showPage('list')">ดูรายการทั้งหมด</button>
    <button class="btn btn-outline" style="font-size:14px;" onclick="startWizard()">+ บันทึกตู้ถัดไป</button>
  </div>
</div>

<script>
// ═══════════════════ CONFIG ═══════════════════
let CFG = {
  clientId:"bfb978c2-2df7-4598-8b29-63df63f724cc",
  tenantId:"34f5f15c-d8ec-4aaa-8240-5b8a5cd8fbb1",
  spSite:"sun108.sharepoint.com",

  modelPath:"RD/Knowledge/Used Can Database/CDB(Web app)/Model",

// ═══════════════════ SP IMAGE CACHE ═══════════════════
// path (ใน SharePoint Documents) → blob URL
const _imgCache = {};
let _cachedDriveId = null;

async function getSpDriveId(){
  if(_cachedDriveId) return _cachedDriveId;
  const H={Authorization:"Bearer "+accessToken};
  const siteRes=await fetch(`https://graph.microsoft.com/v1.0/sites/${CFG.spSite}:/sites/${CFG.spSiteName}`,{headers:H});
  if(!siteRes.ok) throw new Error("ไม่พบ Site");
  const siteId=(await siteRes.json()).id;
  const drvRes=await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/drives`,{headers:H});
  const drv=(await drvRes.json()).value?.find(d=>d.name==="Documents");
  if(!drv) throw new Error("ไม่พบ Drive");
  _cachedDriveId=drv.id;
  return _cachedDriveId;
}

// โหลดรูปจาก SharePoint โดยใช้ token → แปลงเป็น blob URL → ใส่ใน <img>
async function loadSpImg(imgEl, filePath){
  if(!accessToken||!filePath||!imgEl) return;
  if(_imgCache[filePath]){
    imgEl.src=_imgCache[filePath];
    imgEl.classList.remove("detail-img-loading");
    imgEl.classList.add("detail-img-loaded");
    return;
  }
  try{
    const driveId=await getSpDriveId();
    const res=await fetch(
      `https://graph.microsoft.com/v1.0/drives/${driveId}/root:/${encPath(filePath)}:/content`,
      {headers:{Authorization:"Bearer "+accessToken}}
    );
    if(!res.ok) return;
    const blob=await res.blob();
    const blobUrl=URL.createObjectURL(blob);
    _imgCache[filePath]=blobUrl;
    imgEl.src=blobUrl;
    imgEl.classList.remove("detail-img-loading");
    imgEl.classList.add("detail-img-loaded");
  }catch(e){
    console.warn("loadSpImg failed:",filePath,e);
  }
}

// ═══════════════════ SYNC ═══════════════════
async function syncFromSharePoint(){
  if(!accessToken) return;
  const btn=document.getElementById("btn-sync");
  if(btn){btn.innerHTML="⏳ ซิงค์...";btn.disabled=true;}
  try{
    const H={Authorization:"Bearer "+accessToken};
    const siteRes=await fetch(`https://graph.microsoft.com/v1.0/sites/${CFG.spSite}:/sites/${CFG.spSiteName}`,{headers:H});
    if(!siteRes.ok) throw new Error("ไม่พบ Site");
    const siteId=(await siteRes.json()).id;
    const drvRes=await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/drives`,{headers:H});
    const drv=(await drvRes.json()).value?.find(d=>d.name==="Documents");
    if(!drv) throw new Error("ไม่พบ Drive");
    _cachedDriveId=drv.id;
    const exPath=CFG.excelPath?`${CFG.excelPath}/${CFG.excelName}`:`${CFG.modelPath.split("/").slice(0,-1).join("/")}/${CFG.excelName}`;
    const exRes=await fetch(`https://graph.microsoft.com/v1.0/drives/${drv.id}/root:/${encPath(exPath)}:/content`,{headers:H});
    if(!exRes.ok) throw new Error("ไม่พบ Excel");
    const wb2=new ExcelJS.Workbook();
    await wb2.xlsx.load(await exRes.arrayBuffer());
    const spRecs=[];
    wb2.eachSheet(ws=>{
      if(ws.name==="Index") return;
      const brand=ws.getCell(2,2).value||"",model=ws.getCell(3,2).value||"";
      if(!model&&!brand) return;
      const year=String(ws.getCell(4,2).value||""),coolant=String(ws.getCell(5,2).value||""),group=String(ws.getCell(6,2).value||"");
      const folderName=[model,brand,year].filter(Boolean).join("_");
      spRecs.push({id:"sp_"+ws.name,brand,model,year,coolant,group,uploaded:true,folderName,
        photos:Object.fromEntries(PS.map(p=>[p.key,[]])),date:"SharePoint",fromSP:true});
    });
    records=[...spRecs,...records.filter(r=>!r.fromSP&&!spRecs.find(s=>s.folderName===r.folderName))];
    try{localStorage.setItem("cabinet_records",JSON.stringify(records));}catch{}
    renderList();
    if(btn){btn.innerHTML=`🔄 ซิงค์ (${spRecs.length})`;btn.disabled=false;}
  }catch(e){
    if(btn){btn.innerHTML="⚠️ ซิงค์ไม่ได้";btn.disabled=false;}
    console.error(e);
  }
}

  }

    return `<div class="rec-card" onclick="showDetail(${ri})">
      <div class="rec-thumb" id="thumb-wrap-${ri}">

          ?`<img id="list-thumb-${ri}"

              class="detail-img-${blobSrc?"loaded":"loading"}"
              data-sp-path="${spPath}"
              onerror="this.parentElement.innerHTML='📦'"
              style="width:100%;height:100%;object-fit:cover;"/>`
          :"📦"}
      </div>
      <div class="rec-info">
        <div class="rec-model">${r.model||"ไม่ระบุ Model"}</div>
        <div class="rec-tags">
          ${r.brand?`<span class="tag">${r.brand}</span>`:""}
          ${r.year?`<span class="tag">${r.year}</span>`:""}
          <span class="tag ${cnt>0?"green":""}">📷 ${cnt} (${sects}/${PS.length})</span>
          ${r.uploaded?`<span class="tag blue">☁️ SP</span>`:""}
        </div>

      </div>
      <span style="align-self:center;color:var(--g300);font-size:20px;">›</span>
    </div>`;
  }).join("");
  // lazy load thumbnails ที่ยังเป็น loading
  if(accessToken) setTimeout(lazyLoadListThumbs,100);
}

async function lazyLoadListThumbs(){
  const imgs=document.querySelectorAll("img[data-sp-path].detail-img-loading");
  // load แบบ parallel ทีละ 3 เพื่อไม่ล้น API
  for(let i=0;i<imgs.length;i+=3){
    await Promise.all(Array.from(imgs).slice(i,i+3).map(img=>loadSpImg(img,img.dataset.spPath)));
  }
}

  document.getElementById("detail-photos").innerHTML=PS.map(p=>{

      return `<div class="detail-card">
        <div style="height:80px;background:var(--g50);display:flex;align-items:center;justify-content:center;font-size:28px;">${p.icon}</div>

      <div class="detail-photos-strip">

          const spPath=ph.savedName?`${CFG.modelPath}/${r.folderName}/${ph.savedName}`:"";
          const blobSrc=ph.preview||""; // blob URL จาก session นี้ (ถ้ามี)
          // ถ้ามี cache ใช้ทันที
          const cachedSrc=spPath?(_imgCache[spPath]||blobSrc):blobSrc;
          const loaded=!!cachedSrc;
          return `<img
            id="detail-img-${p.key}-${i}"
            src="${cachedSrc}"
            class="detail-img-${loaded?"loaded":"loading"}"
            ${spPath?`data-sp-path="${spPath}"`:""}
            onerror="this.style.opacity='0.1'"
            title="${ph.savedName||ph.name||""}"/>`;
        }).join("")}
      </div>
      <div class="detail-card-label">${p.icon} ${p.label} <span class="count-badge">${photos.length}</span></div>
    </div>`;
  }).join("");

  const btnLoad=document.getElementById("btn-detail-load");

  if(accessToken){

    status.textContent="⏳ กำลังโหลดรูป...";
    _autoLoadDetailImages();
  }else{
    btnLoad.style.display="flex";
    status.textContent="🔐 Login เพื่อดูรูป";
  }
  showPage("detail");
}

async function triggerLoadImages(){
  const ok=await ensureToken();
  if(ok){
    document.getElementById("btn-detail-load").style.display="none";
    document.getElementById("detail-load-status").textContent="⏳ กำลังโหลด...";
    await _autoLoadDetailImages();
  }
}

async function _autoLoadDetailImages(){
  const imgs=document.querySelectorAll("#detail-photos img[data-sp-path]");
  if(!imgs.length){document.getElementById("detail-load-status").textContent="";return;}
  let loaded=0;
  const total=imgs.length;
  const status=document.getElementById("detail-load-status");
  // load ทีละ 4 แบบ parallel
  for(let i=0;i<imgs.length;i+=4){
    await Promise.all(Array.from(imgs).slice(i,i+4).map(async img=>{
      if(img.classList.contains("detail-img-loaded")&&img.src&&img.src.startsWith("blob:")) return;
      await loadSpImg(img,img.dataset.spPath);
      loaded++;
      status.textContent=`⏳ ${loaded}/${total} รูป`;
    }));
  }
  status.textContent=`✅ โหลดครบ ${total} รูป`;
  setTimeout(()=>status.textContent="",3000);
}

function bindDropZone(key){
  const z=document.getElementById("drop-"+key); if(!z) return;
  z.addEventListener("dragover",e=>{e.preventDefault();z.classList.add("drag");});
  z.addEventListener("dragleave",()=>z.classList.remove("drag"));
  z.addEventListener("drop",e=>{e.preventDefault();z.classList.remove("drag");addFiles(key,Array.from(e.dataTransfer.files));});
}
function triggerFileInput(k){document.getElementById("file-input-"+k)?.click();}
function handleFiles(e,k){addFiles(k,Array.from(e.target.files));e.target.value="";}
function addFiles(key,files){
  files.filter(f=>f.type.startsWith("image/")).forEach(f=>{
    const preview=URL.createObjectURL(f);
    const reader=new FileReader();
    reader.onloadend=()=>{wizData.photos[key].push({file:f,preview,dataUrl:reader.result,name:f.name});renderWiz();};
    reader.readAsDataURL(f);
  });
}
document.addEventListener("keydown",e=>{
  if(e.key!=="Enter"||!document.getElementById("page-wizard").classList.contains("active")) return;
  if(document.activeElement?.tagName==="BUTTON") return;
  wizNext();
});
document.addEventListener("paste",e=>{
  if(wizStep<3||wizStep>=TOTAL-1) return;
  const key=PS[wizStep-3].key;
  Array.from(e.clipboardData?.items||[]).filter(it=>it.type.startsWith("image/")).forEach(it=>{
    const file=it.getAsFile();if(!file) return;
    const preview=URL.createObjectURL(file),name=`paste_${Date.now()}.png`;
    const reader=new FileReader();
    reader.onloadend=()=>{wizData.photos[key].push({file,preview,dataUrl:reader.result,name});renderWiz();showPasteToast();};
    reader.readAsDataURL(file);
  });
});
function showPasteToast(){
  let t=document.getElementById("paste-toast");
  if(!t){t=document.createElement("div");t.id="paste-toast";
    t.style.cssText="position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1F2937;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:9999;transition:opacity .3s;";
    document.body.appendChild(t);}
  t.textContent="📋 วางรูปจาก Clipboard แล้ว!";t.style.opacity="1";
  clearTimeout(t._timer);t._timer=setTimeout(()=>t.style.opacity="0",2000);
}
function removePhoto(key,idx){wizData.photos[key].splice(idx,1);renderWiz();}

    <div style="text-align:center;margin-bottom:16px;">
      <div style="width:60px;height:60px;border-radius:18px;background:var(--blue-bg);display:flex;align-items:center;justify-content:center;margin:0 auto 10px;font-size:32px;">☁️</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--blue);letter-spacing:2px;">พร้อมอัปโหลด!</div>
    </div>
    <div style="background:var(--white);border-radius:12px;padding:12px;border:1px solid var(--g200);margin-bottom:10px;">
      ${[["Brand",wizData.brand],["Model",wizData.model],["Year",wizData.year]].map(([k,v])=>
        `<div class="sum-row"><span class="sum-key">${k}</span><span class="sum-val">${v||"—"}</span></div>`).join("")}
    </div>

      📁 <strong>${fn}/</strong> · 📷 ${tp} รูป · 📊 <strong>${CFG.excelName}</strong>

function getFolderName(){
  return [wizData.model,wizData.brand,wizData.year].filter(Boolean).join("_")||"Cabinet_"+Date.now();
}
function setBrand(n){wizData.brand=n;document.getElementById("wiz-brand").value=n;}
function wizBack(){if(wizStep>0){wizStep--;renderWiz();}}
async function wizNext(){
  if(wizStep===0) wizData.brand=document.getElementById("wiz-brand")?.value||wizData.brand;
  if(wizStep===1) wizData.model=document.getElementById("wiz-model")?.value||wizData.model;
  if(wizStep===2) wizData.year=document.getElementById("wiz-year")?.value||wizData.year;
  if(wizStep===TOTAL-1){await doUpload();return;}
  wizStep++;renderWiz();
}

// ═══════════════════ UPLOAD ═══════════════════
async function doUpload(){
  // รอ dataUrl ครบ
  await Promise.all(PS.flatMap(p=>wizData.photos[p.key]||[]).filter(ph=>!ph.dataUrl&&ph.file).map(ph=>new Promise(res=>{
    const r=new FileReader();r.onloadend=()=>{ph.dataUrl=r.result;res();};r.readAsDataURL(ph.file);
  })));

  if(!await ensureToken()) return;
  showPage("uploading");

  const folderName=getFolderName();
  const allPhotos=PS.flatMap(p=>(wizData.photos[p.key]||[]).map((ph,i)=>({...ph,step:p,idx:i})));
  const steps=[
    {label:"🔐 เชื่อมต่อ SharePoint"},
    {label:"📁 สร้างโฟลเดอร์: "+folderName},
    ...allPhotos.map(ph=>({label:`📷 ${ph.step.label} #${ph.idx+1}: ${getRenamedFile(folderName,ph.step.prefix,ph.idx,ph.name)}`})),
    {label:"📊 อ่านไฟล์ Excel"},
    {label:"📝 เพิ่ม Sheet: "+wizData.model},
    {label:"💾 บันทึก Excel กลับ SharePoint"},
  ];
  let done=0;
  const renderSteps=()=>{
    document.getElementById("up-prog").style.width=Math.round((done/steps.length)*100)+"%";
    document.getElementById("up-prog-label").textContent=done+" / "+steps.length;
    document.getElementById("up-steps").innerHTML=steps.map(s=>`
      <div class="up-step"><div class="up-icon ${s.status||"pending"}">${
        s.status==="done"?"✅":s.status==="loading"?"⏳":s.status==="error"?"❌":"⬜"}</div>
        <span class="up-label ${s.status||"pending"}">${s.label}</span></div>`).join("");
  };
  const setS=(i,st)=>{steps[i].status=st;if(st==="done")done++;renderSteps();};
  steps.forEach((_,i)=>setS(i,"pending"));

  try{
    const H={Authorization:"Bearer "+accessToken};

    // Step 0 — Site + Drive
    setS(0,"loading");
    const siteRes=await fetch(`https://graph.microsoft.com/v1.0/sites/${CFG.spSite}:/sites/${CFG.spSiteName}`,{headers:H});
    if(!siteRes.ok) throw new Error("ไม่พบ Site");
    const siteId=(await siteRes.json()).id;
    const drvRes=await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/drives`,{headers:H});
    const drv=(await drvRes.json()).value?.find(d=>d.name==="Documents");
    if(!drv) throw new Error("ไม่พบ Drive");
    const driveId=drv.id; _cachedDriveId=driveId;
    setS(0,"done");

    // Step 1 — Create folder
    setS(1,"loading");
    const cr=await fetch(`https://graph.microsoft.com/v1.0/drives/${driveId}/root:/${encPath(CFG.modelPath)}:/children`,
      {method:"POST",headers:{...H,"Content-Type":"application/json"},
       body:JSON.stringify({name:folderName,folder:{},["@microsoft.graph.conflictBehavior"]:"rename"})});
    if(!cr.ok&&cr.status!==409) throw new Error("สร้างโฟลเดอร์ไม่ได้");
    setS(1,"done");

    // Upload photos
    const savedPhotos=Object.fromEntries(PS.map(p=>[p.key,[]]));
    for(let i=0;i<allPhotos.length;i++){
      const ph=allPhotos[i];
      setS(i+2,"loading");
      const newName=getRenamedFile(folderName,ph.step.prefix,ph.idx,ph.name);
      const upPath=`${CFG.modelPath}/${folderName}/${newName}`;
      const upRes=await fetch(`https://graph.microsoft.com/v1.0/drives/${driveId}/root:/${encPath(upPath)}:/content`,
        {method:"PUT",headers:{...H,"Content-Type":ph.file.type||"image/jpeg"},body:ph.file});
      if(!upRes.ok) throw new Error(`อัปโหลด ${newName} ไม่ได้`);
      await upRes.json();
      // ✅ เก็บ blob URL ไว้ใช้แสดงในเซสชันนี้
      // ✅ เก็บ savedName ไว้ reconstruct path สำหรับ session ถัดไป
      savedPhotos[ph.step.key].push({
        preview: ph.preview,  // blob URL — ใช้งานได้ทันที in-session
        dataUrl: ph.dataUrl,
        savedName: newName,
        name: ph.name,
      });
      // pre-cache ใน _imgCache ด้วย
      _imgCache[upPath]=ph.preview;
      setS(i+2,"done");
    }

    // Read Excel
    const exIdx=2+allPhotos.length;
    setS(exIdx,"loading");
    let wb=new ExcelJS.Workbook();
    const exPath=CFG.excelPath?`${CFG.excelPath}/${CFG.excelName}`:`${CFG.modelPath.split("/").slice(0,-1).join("/")}/${CFG.excelName}`;
    try{
      const exRes=await fetch(`https://graph.microsoft.com/v1.0/drives/${driveId}/root:/${encPath(exPath)}:/content`,{headers:H});
      if(exRes.ok){await wb.xlsx.load(await exRes.arrayBuffer());}
    }catch{}
    setS(exIdx,"done");

    // Build sheet
    setS(exIdx+1,"loading");
    await buildSheetExcelJS(wb,folderName,wizData.brand,wizData.model,wizData.year,savedPhotos,wizData.coolant,wizData.group);
    buildIndexSheet(wb);
    setS(exIdx+1,"done");

    // Upload Excel — ใช้ br (twoCellAnchor) → Excel Online เห็นรูปครบ
    setS(exIdx+2,"loading");
    const excelBuf=await wb.xlsx.writeBuffer();
    const exUp=await fetch(`https://graph.microsoft.com/v1.0/drives/${driveId}/root:/${encPath(exPath)}:/content`,
      {method:"PUT",headers:{...H,"Content-Type":"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"},
       body:new Blob([excelBuf],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"})});
    if(!exUp.ok) throw new Error("อัปโหลด Excel ไม่ได้");
    setS(exIdx+2,"done");

    // ✅ บันทึก localStorage: เก็บ savedName ไม่เก็บ blob/dataUrl
    const photosForStorage=Object.fromEntries(PS.map(p=>[p.key,
      (savedPhotos[p.key]||[]).map(ph=>({savedName:ph.savedName,name:ph.name,preview:""}))
    ]));
    const newRecord={id:Date.now(),brand:wizData.brand,model:wizData.model,year:wizData.year,
      coolant:wizData.coolant,group:wizData.group,uploaded:true,folderName,
      photos:photosForStorage,
      date:new Date().toLocaleDateString("th-TH",{year:"numeric",month:"short",day:"numeric"})};
    // ใน memory session: เก็บ blob preview ไว้ก่อน
    const newRecordSession={...newRecord,photos:savedPhotos};
    records.unshift(newRecordSession);
    // localStorage: ไม่มี blob
    try{localStorage.setItem("cabinet_records",JSON.stringify([newRecord,...records.slice(1)]));}catch{
      try{localStorage.setItem("cabinet_records",JSON.stringify(records.map(r=>({...r,photos:Object.fromEntries(PS.map(p=>[p.key,[]]))}))));} catch{}
    }

    document.getElementById("up-main-icon").textContent="✅";
    document.getElementById("up-title").textContent="บันทึกสำเร็จ!";
    document.getElementById("up-title").style.color="var(--green)";
    const tp=PS.reduce((a,p)=>a+(savedPhotos[p.key]?.length||0),0);
    document.getElementById("success-detail").innerHTML=
      `📁 <strong>${folderName}</strong><br>📷 <strong>${tp} รูป</strong><br>📊 Sheet <strong>"${(wizData.model||"Cabinet").substring(0,31)}"</strong>`;
    setTimeout(()=>showPage("success"),800);

  }catch(e){
    const el=document.getElementById("up-error");
    el.style.display="block";
    el.innerHTML=`<strong>❌ Error:</strong> ${e.message}<br><br>
      <button class="btn btn-outline btn-sm" onclick="showPage('wizard');renderWiz()">← กลับแก้ไข</button>`;
    document.getElementById("up-title").textContent="เกิดข้อผิดพลาด";
    document.getElementById("up-title").style.color="var(--red)";
  }
}

function getRenamedFile(fn,prefix,idx,originalName){
  return `${fn}_${prefix}_${idx+1}.${originalName.split(".").pop()||"jpg"}`;
}
function encPath(p){return p.split("/").map(encodeURIComponent).join("/");}

// ═══════════════════ BUILD INDEX SHEET ═══════════════════
function buildIndexSheet(wb){
  const IDX="Index";const ex=wb.getWorksheet(IDX);if(ex) wb.removeWorksheet(ex.id);
  const ws=wb.addWorksheet(IDX,{properties:{tabColor:{argb:"FF374151"}}});
  const T={style:"thin",color:{argb:"FFD1D5DB"}};const B={top:T,left:T,bottom:T,right:T};
  const COLS=["No.","Brand","Model","Year","Coolant","Group","RD","PD","OP","Invalid","Sheet"];
  const WIDTHS=[6,12,28,8,10,8,6,6,6,8,32];
  WIDTHS.forEach((w,i)=>ws.getColumn(i+1).width=w);
  ws.getRow(1).height=28;
  COLS.forEach((h,i)=>{const c=ws.getCell(1,i+1);c.value=h;c.font={bold:true,size:12,color:{argb:"FFFFFFFF"}};
    c.fill={type:"pattern",pattern:"solid",fgColor:{argb:"FF1F2937"}};c.alignment={vertical:"middle",horizontal:"center"};c.border=B;});
  let no=1;
  wb.eachSheet(sheet=>{
    if(sheet.name===IDX) return;
    const brand=sheet.getCell(2,2).value||"",model=sheet.getCell(3,2).value||"";
    if(!model&&!brand) return;
    const year=String(sheet.getCell(4,2).value||""),coolant=String(sheet.getCell(5,2).value||""),group=String(sheet.getCell(6,2).value||"");
    const r=no+1;ws.getRow(r).height=20;
    const fill=(b)=>{const bl=(b||"").toLowerCase();
      if(bl.includes("national")||bl.includes("panasonic")) return "FFFEF9C3";
      if(bl.includes("fuji")) return "FFE0F2FE";if(bl.includes("sanden")) return "FFEFF6FF";return "FFFFFFFF";};
    const rf=fill(brand);
    [no,brand,model,year,coolant,group,"","","",""].forEach((v,i)=>{
      const c=ws.getCell(r,i+1);c.value=v;c.font={size:11,color:{argb:"FF1F2937"}};
      c.fill={type:"pattern",pattern:"solid",fgColor:{argb:i===0?"FFF3F4F6":rf}};
      c.alignment={vertical:"middle",horizontal:i===0||i>=3?"center":"left",indent:i===1||i===2?1:0};c.border=B;});
    const lc=ws.getCell(r,11);
    lc.value={formula:`HYPERLINK("#'${sheet.name.replace(/'/g,"''")} '!A1",">> ${sheet.name}")`};
    lc.font={size:11,color:{argb:"FF2563EB"},underline:true};lc.fill={type:"pattern",pattern:"solid",fgColor:{argb:rf}};
    lc.alignment={vertical:"middle"};lc.border=B;no++;
  });
}

// ═══════════════════ BUILD EXCEL SHEET ═══════════════════
async function buildSheetExcelJS(wb,folderName,brand,model,year,savedPhotos,coolant="",group=""){
  const sn=(model||"Cabinet").substring(0,31);
  const ex=wb.getWorksheet(sn);if(ex) wb.removeWorksheet(ex.id);
  const ws=wb.addWorksheet(sn);
  const IW=250,IH=250,IRpt=IH*0.75,ICw=IW/7;
  for(let c=1;c<=20;c++) ws.getColumn(c).width=ICw;
  let r=1;
  const tc=(b)=>{const bl=(b||"").toLowerCase();
    if(bl.includes("national")||bl.includes("panasonic")) return "FFFDE68A";
    if(bl.includes("fuji")) return "FF93C5FD";if(bl.includes("sanden")) return "FF1E3A5F";return null;};
  const tab=tc(brand);if(tab) ws.properties.tabColor={argb:tab};
  const T={style:"thin",color:{argb:"FFD1D5DB"}},B={top:T,left:T,bottom:T,right:T},AC="FFD72B2B";
  ws.getRow(r).height=36;
  const ti=ws.getCell(r,1);
  ti.value=`${brand?brand.toUpperCase()+" — ":""}${model||"CABINET"} ${year?`(${year})`:""}`;
  ti.font={bold:true,size:16,color:{argb:"FF1F2937"}};ti.alignment={vertical:"middle"};
  ti.border={bottom:{style:"medium",color:{argb:AC}}};r++;
  for(const [lb,vl] of [["Brand",brand],["Model",model],["Year",year],["Coolant",coolant],["Group",group]]){
    ws.getRow(r).height=22;
    const lc=ws.getCell(r,1);lc.value=lb;lc.font={bold:true,size:11,color:{argb:"FF6B7280"}};
    lc.fill={type:"pattern",pattern:"solid",fgColor:{argb:"FFF9FAFB"}};lc.alignment={vertical:"middle",indent:1};lc.border=B;
    const vc=ws.getCell(r,2);vc.value=vl||"—";vc.font={bold:true,size:11,color:{argb:"FF111827"}};
    vc.alignment={vertical:"middle",indent:1};vc.border=B;r++;
  }
  ws.getRow(r).height=14;r++;
  for(const p of PS){
    const photos=savedPhotos[p.key]||[];
    ws.getRow(r).height=26;
    const sc=ws.getCell(r,1);sc.value=`${p.icon}  ${p.label}`;
    sc.font={bold:true,size:12,color:{argb:"FF1F2937"}};
    sc.fill={type:"pattern",pattern:"solid",fgColor:{argb:"FFF3F4F6"}};
    sc.alignment={vertical:"middle",indent:2};
    sc.border={left:{style:"medium",color:{argb:AC}},top:T,bottom:T,right:T};r++;
    if(!photos.length){
      ws.getRow(r).height=30;ws.getCell(r,1).value="(ไม่มีรูป)";
      ws.getCell(r,1).font={italic:true,size:10,color:{argb:"FF9CA3AF"}};r++;
    }else{
      ws.getRow(r).height=IRpt;
      for(let i=0;i<photos.length;i++){
        const ph=photos[i];if(!ph.dataUrl||!ph.dataUrl.startsWith("data:")) continue;
        try{
          const b64=await new Promise((res,rej)=>{
            const img=new Image();
            img.onload=()=>{
              const MAX=400;let w=img.naturalWidth||img.width,h=img.naturalHeight||img.height;
              if(!w||!h){rej(new Error("size 0"));return;}
              if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
              const cv=document.createElement("canvas");cv.width=w;cv.height=h;
              cv.getContext("2d").drawImage(img,0,0,w,h);
              res(cv.toDataURL("image/jpeg",.5).split(",")[1]);
            };img.onerror=rej;img.src=ph.dataUrl;
          });
          const imgId=wb.addImage({base64:b64,extension:"jpeg"});
          // ✅ ใช้ br (twoCellAnchor) → Excel Online แสดงรูปได้ทันที
          ws.addImage(imgId,{tl:{col:i+1,row:r-1},br:{col:i+2,row:r}});
        }catch(e){console.warn("embed:",ph.name,e);}
      }
      r++;
      ws.getRow(r).height=14;
      for(let i=0;i<photos.length;i++){
        const fc=ws.getCell(r,i+2);fc.value=`${i+1}. ${photos[i].savedName}`;
        fc.font={size:8,color:{argb:"FF6B7280"}};fc.alignment={wrapText:true,vertical:"top"};
      }
      r++;
    }
    ws.getRow(r++).height=6;
  }
}
</script>
